<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FDE Cycle Ordering Game</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
}

.container {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

#pool, #order {
    width: 40%;
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
    min-height: 320px;
}

.step {
    padding: 10px;
    margin: 8px;
    background: #334155;
    border-radius: 8px;
    cursor: grab;
}

.slot {
    height: 45px;
    margin: 8px;
    border: 2px dashed #475569;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

.correct {
    background: rgba(34,197,94,0.3);
}

.incorrect {
    background: rgba(239,68,68,0.3);
}
</style>
</head>

<body>

<h1>Arrange the Fetch–Decode–Execute Cycle</h1>

<div class="container">

<div id="pool"></div>

<div id="order">
    <h3>Place steps here (Top → Bottom)</h3>
</div>

</div>

<button onclick="checkOrder()">Check</button>
<p id="result"></p>

<script>

const correctOrder = [
"Program Counter (PC) sends address to MAR",
"MAR sends address to memory",
"Memory places instruction in MDR",
"MDR transfers instruction to IR",
"CU decodes instruction",
"ALU executes instruction if required",
"Result stored in ACC or memory",
"PC increments to next instruction"
];

// Shuffle
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

let dragged = null;

// Create steps
const pool = document.getElementById("pool");
shuffle([...correctOrder]).forEach(text => {
    const div = document.createElement("div");
    div.className = "step";
    div.draggable = true;
    div.innerText = text;

    div.addEventListener("dragstart", () => {
        dragged = div;
    });

    pool.appendChild(div);
});

// Make pool droppable
pool.addEventListener("dragover", e => e.preventDefault());
pool.addEventListener("drop", () => {
    if (dragged) {
        pool.appendChild(dragged);
    }
});

// Create slots
const order = document.getElementById("order");

for (let i = 0; i < 8; i++) {

    const slot = document.createElement("div");
    slot.className = "slot";

    slot.addEventListener("dragover", e => e.preventDefault());

    slot.addEventListener("drop", () => {

        if (!dragged) return;

        // If slot already has item → swap
        if (slot.firstChild) {

            const existing = slot.firstChild;

            // If dragged came from another slot → swap
            if (dragged.parentElement.classList.contains("slot")) {
                dragged.parentElement.appendChild(existing);
            } 
            else {
                pool.appendChild(existing);
            }
        }

        slot.appendChild(dragged);
    });

    order.appendChild(slot);
}

// Check answers
function checkOrder() {

    const slots = document.querySelectorAll(".slot");
    let score = 0;

    slots.forEach((slot, index) => {

        slot.classList.remove("correct", "incorrect");

        if (!slot.firstChild) {
            slot.classList.add("incorrect");
            return;
        }

        const text = slot.firstChild.innerText;

        if (text === correctOrder[index]) {
            slot.classList.add("correct");
            score++;
        } else {
            slot.classList.add("incorrect");
        }
    });

    document.getElementById("result").innerText =
        "Score: " + score + " / 8";
}

</script>

</body>
</html>
