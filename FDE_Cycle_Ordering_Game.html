<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FDE Cycle Ordering Game</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.container {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

/* POOL */
#pool {
    width: 40%;
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
    min-height: 300px;
}

/* ORDER AREA */
#order {
    width: 40%;
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
    min-height: 300px;
}

/* STEP ITEMS */
.step {
    padding: 10px;
    margin: 8px;
    background: #334155;
    border-radius: 8px;
    cursor: grab;
}

/* DROP SLOT */
.slot {
    height: 45px;
    margin: 8px;
    border: 2px dashed #475569;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

/* FEEDBACK */
.correct {
    background: rgba(34,197,94,0.3);
    border: 2px solid #22c55e;
}

.incorrect {
    background: rgba(239,68,68,0.3);
    border: 2px solid #ef4444;
}
</style>
</head>

<body>

<h1>Arrange the Fetch–Decode–Execute Cycle</h1>

<div class="container">

<!-- SHUFFLED STEPS -->
<div id="pool"></div>

<!-- ORDER AREA -->
<div id="order">
    <h3>Place steps here (Top → Bottom)</h3>
</div>

</div>

<button onclick="checkOrder()">Check</button>

<p id="result"></p>

<script>

// Correct order (hidden from students)
const correctOrder = [
"Program Counter (PC) sends address to MAR",
"MAR sends address to memory",
"Memory places instruction in MDR",
"MDR transfers instruction to IR",
"CU decodes instruction",
"ALU executes instruction if required",
"Result stored in ACC or memory",
"PC increments to next instruction"
];

// Shuffle function
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

// Create draggable steps
const pool = document.getElementById("pool");

let steps = shuffle([...correctOrder]);

steps.forEach(text => {
    let div = document.createElement("div");
    div.className = "step";
    div.draggable = true;
    div.innerText = text;

    div.addEventListener("dragstart", () => {
        dragged = div;
    });

    pool.appendChild(div);
});

// Create 8 slots
const order = document.getElementById("order");

for (let i = 0; i < 8; i++) {
    let slot = document.createElement("div");
    slot.className = "slot";

    slot.addEventListener("dragover", e => e.preventDefault());

    slot.addEventListener("drop", () => {
        if (slot.children.length === 0) {
            slot.appendChild(dragged);
        }
    });

    order.appendChild(slot);
}

let dragged = null;

// Check order
function checkOrder() {

    let slots = document.querySelectorAll(".slot");
    let score = 0;

    slots.forEach((slot, index) => {

        slot.classList.remove("correct", "incorrect");

        if (!slot.firstChild) {
            slot.classList.add("incorrect");
            return;
        }

        let text = slot.firstChild.innerText;

        if (text === correctOrder[index]) {
            slot.classList.add("correct");
            score++;
        } else {
            slot.classList.add("incorrect");
        }
    });

    document.getElementById("result").innerText =
        "Score: " + score + " / 8";
}
</script>

</body>
</html>
