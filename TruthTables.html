<body>

<h1>Boolean Logic Truth Table</h1>

<div id="expression"></div>

<table id="table"></table>

<button onclick="checkAnswers()">Check</button>
<button onclick="generate()">New Expression</button>

<script>

// Operators
const operators = ["AND", "OR", "XOR", "NAND", "NOR", "XNOR"];
const variables = ["A", "B", "C"];

function generateExpression() {

    const operators = ["AND", "OR", "XOR", "NAND", "NOR", "XNOR"];
    const variables = ["A", "B", "C"];

    let numVars = Math.floor(Math.random() * 2) + 2; // 2 or 3 vars
    let vars = variables.slice(0, numVars);

    function randomVar() {
        let v = vars[Math.floor(Math.random() * vars.length)];
        if (Math.random() < 0.3) {
            return "(NOT " + v + ")";
        }
        return v;
    }

    function build(depth) {

        // Base case: return a variable
        if (depth === 0) {
            return randomVar();
        }

        let op = operators[Math.floor(Math.random() * operators.length)];

        // Randomly decide structure
        let leftDepth = Math.floor(Math.random() * depth);
        let rightDepth = depth - 1 - leftDepth;

        let left = build(leftDepth);
        let right = build(rightDepth);

        return "(" + left + " " + op + " " + right + ")";
    }

    let depth = Math.floor(Math.random() * 2) + 2; // depth 2–3

    let expr = build(depth);

    return { expr, vars };
}

// Evaluate expression
function evalExpr(expr, values) {

    // Tokenize
    let tokens = expr
        .replace(/\(/g, " ( ")
        .replace(/\)/g, " ) ")
        .split(/\s+/)
        .filter(t => t.length > 0);

    // Replace variables
    tokens = tokens.map(t => {
        if (values[t]) return values[t] === "TRUE";
        return t;
    });

    function apply(op, a, b) {
        if (op === "AND") return a && b;
        if (op === "OR") return a || b;
        if (op === "XOR") return a !== b;
        if (op === "NAND") return !(a && b);
        if (op === "NOR") return !(a || b);
        if (op === "XNOR") return a === b;
    }

    function evaluate(tokens) {

        // Resolve parentheses first
        while (tokens.includes("(")) {
            let close = tokens.indexOf(")");
            let open = tokens.lastIndexOf("(", close);

            let sub = tokens.slice(open + 1, close);
            let value = evaluate(sub);

            tokens.splice(open, close - open + 1, value);
        }

        // Resolve NOT
        for (let i = 0; i < tokens.length; i++) {
            if (tokens[i] === "NOT") {
                tokens.splice(i, 2, !tokens[i + 1]);
                i--;
            }
        }

        // Resolve binary ops left → right (safe because brackets handled)
        while (tokens.length > 1) {
            let a = tokens[0];
            let op = tokens[1];
            let b = tokens[2];

            tokens.splice(0, 3, apply(op, a, b));
        }

        return tokens[0];
    }

    return evaluate(tokens);
}

// Generate truth table
let correctOutputs = [];

function generate() {

    const {expr, vars} = generateExpression();

    document.getElementById("expression").innerText = expr;

    let table = document.getElementById("table");
    table.innerHTML = "";

    // Header
    let header = "<tr>";
    vars.forEach(v => header += `<th>${v}</th>`);
    header += "<th>Output</th></tr>";
    table.innerHTML += header;

    let rows = Math.pow(2, vars.length);
    correctOutputs = [];

    for (let i = 0; i < rows; i++) {

        let values = {};
        let rowHTML = "<tr>";

        vars.forEach((v, index) => {
            let val = (i >> (vars.length - index - 1)) & 1;
            values[v] = val ? "TRUE" : "FALSE";
            rowHTML += `<td>${values[v]}</td>`;
        });

        let result = evalExpr(expr, values);
        correctOutputs.push(result);

        rowHTML += `
        <td>
            <select>
                <option value="TRUE">TRUE</option>
                <option value="FALSE">FALSE</option>
            </select>
        </td>`;

        rowHTML += "</tr>";
        table.innerHTML += rowHTML;
    }
}

// Check answers
function checkAnswers() {

    let rows = document.querySelectorAll("#table tr");
    let score = 0;

    for (let i = 1; i < rows.length; i++) {
        let select = rows[i].querySelector("select");
        let user = select.value === "TRUE";
        let correct = correctOutputs[i - 1];

        rows[i].classList.remove("correct", "incorrect");

        if (user === correct) {
            rows[i].classList.add("correct");
            score++;
        } else {
            rows[i].classList.add("incorrect");
        }
    }

    alert("Score: " + score + " / " + correctOutputs.length);
}

// init
generate();

</script>

</body>
